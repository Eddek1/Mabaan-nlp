<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Mabaan Labeller{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; line-height: 1.5; }
  header { background: #2c4a2e; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: .9rem; opacity: .7; }
  .container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #2c4a2e; }
  pre { background: #f8f8f6; border: 1px solid #e0e0d8; border-radius: 6px; padding: 14px;
        font-size: .82rem; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: .75rem; font-weight: 600; }
  .badge.high   { background: #d4edda; color: #155724; }
  .badge.medium { background: #fff3cd; color: #856404; }
  .badge.low    { background: #f8d7da; color: #721c24; }
  .badge.unknown{ background: #e2e3e5; color: #383d41; }
  .btn { display: inline-block; padding: 10px 22px; border-radius: 6px; font-size: .9rem;
         font-weight: 600; cursor: pointer; border: none; text-decoration: none; }
  .btn-approve  { background: #2c4a2e; color: #fff; }
  .btn-reject   { background: #b91c1c; color: #fff; }
  .btn-edit     { background: #1d4ed8; color: #fff; }
  .btn-skip     { background: #e5e7eb; color: #374151; }
  .btn:hover    { opacity: .88; }
  .actions      { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
  .meta         { font-size: .8rem; color: #666; margin-top: 6px; }
  .progress     { background: #e5e7eb; border-radius: 4px; height: 8px; margin-bottom: 16px; }
  .progress-bar { background: #2c4a2e; height: 8px; border-radius: 4px; }
  .empty        { text-align: center; padding: 48px 0; color: #888; }
  table         { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th, td        { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
  th            { background: #f8f8f6; font-weight: 600; }
  .field-row    { margin-bottom: 14px; }
  .field-row label { display: block; font-size: .82rem; font-weight: 600; color: #555; margin-bottom: 4px; }
  .field-row input, .field-row textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: .9rem; }
  .field-row textarea { min-height: 80px; resize: vertical; font-family: monospace; }
  .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: .9rem; }
  .alert-success { background: #d4edda; color: #155724; }
  .alert-error   { background: #f8d7da; color: #721c24; }
  .verses        { font-size: .82rem; background: #fffbeb; border: 1px solid #fde68a;
                   border-radius: 6px; padding: 12px; margin-top: 8px; }
  .verses strong { display: block; margin-bottom: 6px; color: #92400e; }
  .verse-item    { margin-bottom: 4px; }
  .verse-ref     { color: #92400e; font-weight: 600; margin-right: 6px; }
</style>
</head>
<body>
<header>
  <h1>Mabaan Language Labeller</h1>
  {% if labeller %}<span>Logged in as {{ labeller }}</span>{% endif %}
</header>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
